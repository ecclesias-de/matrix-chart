workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

stages:
  - package
  - test

build-synapse-image:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.15.0-debug
    entrypoint: [ "sh", "-c" ]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - export SYNAPSE_VERSION=$(cat docker/synapse/.meta/tag)
    - export IMAGE_VERSION=$(echo "${CI_COMMIT_TAG:-synapse-image-${SYNAPSE_VERSION}-sha${CI_COMMIT_SHORT_SHA}}" | cut -b 15-)
    - |
      if [[ "${IMAGE_VERSION}" != ${SYNAPSE_VERSION}* ]]; then
        echo tag image version incorrect:
        echo "CI_COMMIT_TAG: ${CI_COMMIT_TAG} IMAGE_VERSION: ${IMAGE_VERSION} synapse version: ${SYNAPSE_VERSION}"
        echo "tag should be: synapse-image-<synapse source image version starting with v>-mw<build counter starting with 1>"
        echo "synapse version is set in docker/synapse/.meta/tag"
        exit 1
      fi
    - >-
      /kaniko/executor
      --skip-unused-stages
      --use-new-run
      --context "${CI_PROJECT_DIR}"
      --dockerfile docker/synapse/Dockerfile
      --build-arg SYNAPSE_VERSION
      --destination "${CI_REGISTRY_IMAGE}/synapse:${IMAGE_VERSION}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^synapse-image-v.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

package-matrix-chart:
  stage: package
  image: alpine/k8s:1.25.15
  before_script:
    - helm registry login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}"
  script:
    - export CHART_VERSION=$(echo "${CI_COMMIT_TAG:-matrix-0.0.0+${CI_COMMIT_SHORT_SHA}}" | cut -b 8-)
    - yq e -i '.version = (strenv(CHART_VERSION))' ./charts/matrix/Chart.yaml
    - helm package -d build/ -u ./charts/matrix
    - helm push build/*-${CHART_VERSION}.tgz "oci://${CI_REGISTRY_IMAGE}/charts"
  rules:
    - if: $CI_COMMIT_TAG =~ /^matrix-.*/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

package-element-chart:
  stage: package
  image: alpine/k8s:1.25.15
  before_script:
    - helm registry login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}"
  script:
    - export CHART_VERSION=$(echo "${CI_COMMIT_TAG:-element-0.0.0+${CI_COMMIT_SHORT_SHA}}" | cut -b 9-)
    - yq e -i '.version = (strenv(CHART_VERSION))' ./charts/element/Chart.yaml
    - helm package -d build/ -u ./charts/element
    - helm push build/*-${CHART_VERSION}.tgz "oci://${CI_REGISTRY_IMAGE}/charts"
  rules:
    - if: $CI_COMMIT_TAG =~ /^element-.*/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

package-sygnal-chart:
  stage: package
  image: alpine/k8s:1.25.15
  before_script:
    - helm registry login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}"
  script:
    - export CHART_VERSION=$(echo "${CI_COMMIT_TAG:-sygnal-0.0.0+${CI_COMMIT_SHORT_SHA}}" | cut -b 8-)
    - yq e -i '.version = (strenv(CHART_VERSION))' ./charts/sygnal/Chart.yaml
    - helm package -d build/ -u ./charts/sygnal
    - helm push build/*-${CHART_VERSION}.tgz "oci://${CI_REGISTRY_IMAGE}/charts"
  rules:
    - if: $CI_COMMIT_TAG =~ /^sygnal-.*/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-deploy:
  stage: test
  image: alpine/k8s:1.25.15
  environment:
    name: test-$CI_COMMIT_REF_SLUG
    url: https://element.$CI_COMMIT_REF_SLUG.$TEST_DEPLOY_BASE_DOMAIN
    deployment_tier: development
    on_stop: test-deploy-teardown
  variables:
    DEPLOYMENT_NAME: $CI_COMMIT_REF_SLUG
  before_script:
    - helm registry login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}"
    - sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
    - helm repo add dex https://charts.dexidp.io
    - kubectl config use-context $TEST_DEPLOY_AGENT_CONTEXT
    - task test-deploy:dex
    - task test-deploy:postgres
    - task test-deploy:redis
  script:
    - CHART="oci://${CI_REGISTRY_IMAGE}/charts/sygnal --version 0.0.0+${CI_COMMIT_SHORT_SHA}" task test-deploy:sygnal
    - CHART="oci://${CI_REGISTRY_IMAGE}/charts/matrix --version 0.0.0+${CI_COMMIT_SHORT_SHA}" task test-deploy:matrix
    - CHART="oci://${CI_REGISTRY_IMAGE}/charts/matrix --version 0.0.0+${CI_COMMIT_SHORT_SHA}" task test-deploy:element
    - task test-deploy:init-corporal-policy || (sleep 30; task test-deploy:init-corporal-policy)
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-deploy-teardown:
  stage: test
  image: alpine/k8s:1.25.15
  environment:
    name: test-$CI_COMMIT_REF_SLUG
    action: stop
  variables:
    DEPLOYMENT_NAME: $CI_COMMIT_REF_SLUG
  before_script:
    - sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
    - kubectl config use-context $TEST_DEPLOY_AGENT_CONTEXT
  script:
    - task test-deploy:teardown
  when: manual
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"