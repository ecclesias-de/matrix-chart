apiVersion: v1
kind: Service
metadata:
  name: {{ include "elementCall.basename" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "elementCall.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  # clusterIP: None
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8080
  selector: {{- include "elementCall.matchLabels" . | nindent 4 }}