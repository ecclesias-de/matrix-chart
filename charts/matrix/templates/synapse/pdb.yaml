apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ template "synapse.basename" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "synapse.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels: {{- include "matchLabels" . | nindent 6 }}
      synapse-endpoints: generic