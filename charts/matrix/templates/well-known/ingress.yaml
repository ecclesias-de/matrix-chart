{{- if and .Values.wellknown.enabled  .Values.wellknown.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wellknown.basename" . }}
  namespace: {{ .Release.Namespace | quote }}
  {{- if .Values.wellknown.ingress.annotations }}
  annotations: {{ .Values.wellknown.ingress.annotations | toYaml | nindent 4 }}
  {{- end }}
spec:
  rules:
    - host: {{ .Values.synapse.homeserverConfig.server_name }}
      http:
        paths:
          - backend:
              service:
                name: {{ include "wellknown.basename" . }}
                port:
                  number: 80
            path: /.well-known/matrix/
            pathType: Prefix
  tls:
    - hosts:
        - {{ .Values.synapse.homeserverConfig.server_name | quote }}
      secretName: {{ printf "%s-tls" .Values.synapse.homeserverConfig.server_name }}
{{- end }}