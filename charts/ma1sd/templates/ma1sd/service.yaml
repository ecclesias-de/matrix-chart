apiVersion: v1
kind: Service
metadata:
  name: {{ include "ma1sd.basename" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "ma1sd.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: http
  selector: {{- include "ma1sd.matchLabels" . | nindent 4 }}
