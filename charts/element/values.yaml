element:
  # values inside these config are rended by the templateing engin. See readme for usage and caveats.
  config:
    default_server_config:
      m.homeserver:
        base_url: "https://{{ .Values.synapse.ingress.hostname }}/"

  nginx_vhost_overwrite: ""

  deployment:
    imagePullSecrets: []
    image:
      repository: vectorim/element-web
      tag: v1.11.97
    resources: {}

  ingress:
    annotations:
      kubernetes.io/tls-acme: "true"
    enabled: true
    hostname: ""

metadata:
  team:
  name:

debug:
  diagnoseMode:
    element:
      enabled: false
      command:
        - tail
        - -f
        - /dev/null
  securityContext:
    element:
      enabled: true