apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "element.basename" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "element.labels" . | nindent 4 }}
data:
  config.json: |
    {{- tpl ( .Values.element.config | toJson ) . | nindent 4 }}

  default.conf.template: |
    server {
      listen       8080;
      listen  [::]:8080;
      server_name  localhost;

      root   /usr/share/nginx/html;
      index  index.html;

      # Set no-cache for the version, config and index.html
      # so that browsers always check for a new copy of Element Web.
      # NB http://your-domain/ and http://your-domain/? are also covered by this

      location = /index.html {
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
          add_header Content-Security-Policy "frame-ancestors 'self' {{ join " " .Values.element.extraFrameAncestors }}";
          add_header Cache-Control "no-cache";
      }
      location = /version {
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
          add_header Content-Security-Policy "frame-ancestors 'self' {{ join " " .Values.element.extraFrameAncestors }}";
          add_header Cache-Control "no-cache";
      }
      # covers config.json and config.hostname.json requests as it is prefix.
      location /config {
          root /tmp/element-web-config;
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
          add_header Content-Security-Policy "frame-ancestors 'self' {{ join " " .Values.element.extraFrameAncestors }}";
          add_header Cache-Control "no-cache";
      }
      location /modules {
          add_header X-Frame-Options SAMEORIGIN;
          add_header X-Content-Type-Options nosniff;
          add_header X-XSS-Protection "1; mode=block";
          add_header Content-Security-Policy "frame-ancestors 'self' {{ join " " .Values.element.extraFrameAncestors }}";
          alias /modules;
      }
      # redirect server error pages to the static page /50x.html
      #
      error_page   500 502 503 504  /50x.html;
    }